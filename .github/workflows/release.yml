name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version bump type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: Custom version (only when "custom" is selected, e.g. 1.2.3)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Create Release PR
    runs-on: ubuntu-latest

    steps:
      - name: Validate custom version
        if: inputs.version == 'custom'
        env:
          CUSTOM_VERSION: ${{ inputs.custom_version }}
        run: |
          if [ -z "$CUSTOM_VERSION" ]; then
            echo "::error::custom_version is required when version is 'custom'"
            exit 1
          fi
          if ! echo "$CUSTOM_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::custom_version must be a valid semver (e.g. 1.2.3)"
            exit 1
          fi

      # Release pushes a branch, so the checkout token must persist.
      - name: Checkout repository # zizmor: ignore[artipacked]
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Bump version
        id: bump
        env:
          VERSION_TYPE: ${{ inputs.version }}
          CUSTOM_VERSION: ${{ inputs.custom_version }}
        run: |
          if [ "$VERSION_TYPE" = "custom" ]; then
            pnpm version "$CUSTOM_VERSION" --no-git-tag-version
          else
            pnpm version "$VERSION_TYPE" --no-git-tag-version
          fi
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create branch, commit, and push
        env:
          LEFTHOOK: "0"
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          BRANCH="release/v${VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          git add package.json
          git commit -m "chore: release v${VERSION}"
          git push -u origin "$BRANCH"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          BRANCH="release/v${VERSION}"
          EXISTING=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already exists for ${BRANCH}, skipping creation"
          else
            BODY=$(cat <<EOF
          ## Summary
          - Bump package version to v${VERSION}
          EOF
            )
            gh pr create \
              --title "chore: release v${VERSION}" \
              --body "$BODY" \
              --base main
          fi
