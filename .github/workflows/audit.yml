name: Audit

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup
        uses: ./.github/actions/setup

      - name: Run dependency audit
        run: pnpm audit --audit-level=moderate
